# Docker compose for Agency Next.js app
version: "3.8"

services:
  agency:
    build:
      context: .
      dockerfile: Dockerfile.nextjs
      args:
        APP_NAME: agency
    ports:
      - "3004:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - viago-dev

  admin:
    build:
      context: .
      dockerfile: Dockerfile.nextjs
      args:
        APP_NAME: admin
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - viago-dev

  alpha:
    build:
      context: .
      dockerfile: Dockerfile.nextjs
      args:
        APP_NAME: alpha
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - viago-dev

  cashier:
    build:
      context: .
      dockerfile: Dockerfile.nextjs
      args:
        APP_NAME: cashier
    ports:
      - "3006:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - viago-dev

networks:
  viago-dev:
    driver: bridge
