services:
  # Traefik Reverse Proxy
  traefik:
    image: traefik:v3.4
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=viago_production_network"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # HTTP → HTTPS redirect
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # Let's Encrypt
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=support@viago.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--providers.file.filename=/traefik-tls.yml"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
      - /opt/viago/certs:/certs:ro
      - /opt/viago/traefik-tls.yml:/traefik-tls.yml:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.1"
    labels:
      # Rate limiting middleware
      - "traefik.enable=true"
      - "traefik.http.middlewares.rate-limit-production.ratelimit.average=100"
      - "traefik.http.middlewares.rate-limit-production.ratelimit.burst=50"
      - "traefik.http.middlewares.rate-limit-production.ratelimit.period=1s"
    networks:
      - viago_network

  # POSTGRESQL Database
  postgres:
    image: postgres:18-alpine
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backups:/backups
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 5
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    networks:
      - viago_network

  # Main API Server
  api:
    image: ghcr.io/azizbecha/viago-monorepo/server:${IMAGE_TAG:-latest}
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=warn
      - DEBUG=false
      - QUEUE_CLUSTER=true
      - REDIS_HOST=redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      mode: replicated
      replicas: 3
      update_config:
        parallelism: 1
        order: start-first
        delay: 30s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-production.rule=Host(`api.viago.com`) || Host(`135.125.159.234`)"
      - "traefik.http.routers.api-production.priority=1"
      - "traefik.http.routers.api-production.entrypoints=web,websecure"
      - "traefik.http.routers.api-production.tls=true"
      - "traefik.http.routers.api-production.tls.certresolver="
      - "traefik.http.services.api-production.loadbalancer.server.port=3000"
      - "traefik.http.routers.api-production.middlewares=rate-limit-production@docker"
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.monitor-only=false"
    networks:
      - viago_network

  # Redis Cache
  redis:
    image: redis:8-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    networks:
      - viago_network

  # pgAdmin - Database Management
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@viago.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-passer}
      SCRIPT_NAME: /pgadmin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pgadmin.rule=Host(`135.125.159.234`) && PathPrefix(`/pgadmin`)"
      - "traefik.http.routers.pgadmin.priority=10"
      - "traefik.http.routers.pgadmin.entrypoints=web,websecure"
      - "traefik.http.routers.pgadmin.tls=true"
      - "traefik.http.routers.pgadmin.tls.certresolver="
      - "traefik.http.services.pgadmin.loadbalancer.server.port=80"
      - "com.centurylinklabs.watchtower.enable=false"
    networks:
      - viago_network

  # Container Monitoring
  dozzle:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DOZZLE_ADDR=:9000
      - DOZZLE_BASE=/dozzle
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 3s
      timeout: 30s
      retries: 50
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
        reservations:
          memory: 128M
          cpus: "0.1"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dozzle.rule=Host(`135.125.159.234`) && PathPrefix(`/dozzle`)"
      - "traefik.http.routers.dozzle.priority=10"
      - "traefik.http.routers.dozzle.entrypoints=web,websecure"
      - "traefik.http.routers.dozzle.tls=true"
      - "traefik.http.routers.dozzle.tls.certresolver="
      - "traefik.http.services.dozzle.loadbalancer.server.port=9000"
      - "com.centurylinklabs.watchtower.enable=false"
    networks:
      - viago_network

  # Watchtower - Auto-update containers
  watchtower:
    image: containrrr/watchtower:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_POLL_INTERVAL=30
      - WATCHTOWER_ROLLING_RESTART=true
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    networks:
      - viago_network

volumes:
  postgres_data:
    driver: local
  postgres_backups:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local
  letsencrypt:
    driver: local

networks:
  viago_network:
    driver: bridge
    name: viago_production_network
