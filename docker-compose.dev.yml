version: "3.8"

services:
  # PostgreSQL database for development
  postgres:
    image: postgres:17-alpine
    container_name: viago-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: viago
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: passer
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - viago-dev

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: viago-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - viago-dev

  # pgAdmin UI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: viago-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@viago.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - viago-dev

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:

networks:
  viago-dev:
    driver: bridge